name: Daily MLB Report

on:
  schedule:
    # 14:00 UTC = 10:00 AM Eastern (adjust if you want a different time)
    - cron: '0 14 * * *'
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run prediction script
        run: python predict.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --quiet --cached || git commit -m "Daily MLB report update"
          git push

