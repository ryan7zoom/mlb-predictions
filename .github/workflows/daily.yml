name: Daily MLB Report

on:
  schedule:
    - cron: '0 12 * * *'   # 06:00 AM ET / 18:00 Bangladesh - early check, lineups likely not posted yet
    - cron: '0 16 * * *'   # 12:00 PM ET / 22:00 Bangladesh - most lineups posted by now
    - cron: '0 19 * * *'   # 03:00 PM ET / 01:00 Bangladesh - catches late-posting lineups
    - cron: '30 21 * * *'  # 05:30 PM ET / 03:30 Bangladesh - last call before early games start
  workflow_dispatch: {}   # manual "Run workflow" button always fetches fresh live data

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run prediction script
        run: python predict.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
